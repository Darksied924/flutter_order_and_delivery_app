name: flutter_order_and_delivery_app
description: "Order and Delivery App with M-Pesa payment integration"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.6
  
  # State Management
  provider: ^6.1.2
  
  # HTTP
  http: ^1.2.2
  
  # Date/Time formatting
  intl: ^0.20.2
  
  # Image handling
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/images/

